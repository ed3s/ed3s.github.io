<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>حاسبة العمر</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f0f10,#1c1c1e);
font-family:'IBM Plex Sans Arabic',sans-serif;
color:white;
direction:rtl;
padding:20px;
}

.container{
width:100%;
max-width:420px;
background:#1f1f21;
border-radius:28px;
padding:35px 25px;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
text-align:center;
}

h1{
font-size:26px;
margin-bottom:25px;
}

.picker{
display:flex;
gap:10px;
margin-bottom:20px;
}

.picker select{
flex:1;
padding:14px;
border-radius:14px;
border:none;
background:#2c2c2e;
color:white;
font-size:16px;
text-align:center;
font-family:'IBM Plex Sans Arabic',sans-serif;
appearance:none;
}

button{
width:100%;
padding:16px;
border-radius:14px;
border:none;
background:#5d0dff;
color:white;
font-size:17px;
cursor:pointer;
font-weight:500;
transition:0.3s;
}

button:hover{
background:#7a3cff;
}

.card{
margin-top:25px;
background:#2c2c2e;
padding:22px;
border-radius:18px;
font-size:22px;
font-weight:500;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
min-height:40px;
}

footer{
margin-top:30px;
font-size:12px;
color:#888;
}

footer a{
color:inherit;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<h1>حاسبة العمر</h1>

<div class="picker">

<select id="day"></select>
<select id="month"></select>
<select id="year"></select>

</div>

<button onclick="calculate()">احسب العمر</button>

<div class="card" id="result"></div>

</div>

<footer>
بواسطة <a href="https://ed3s.com">ed3s.com</a>
</footer>

<script>

// تعبئة الأيام
for(let i=1;i<=31;i++){
let option=document.createElement("option");
option.value=i;
option.text=i;
document.getElementById("day").appendChild(option);
}

// تعبئة الأشهر
for(let i=1;i<=12;i++){
let option=document.createElement("option");
option.value=i;
option.text=i;
document.getElementById("month").appendChild(option);
}

// تعبئة السنوات
let currentYear=new Date().getFullYear();

for(let i=currentYear;i>=1900;i--){
let option=document.createElement("option");
option.value=i;
option.text=i;
document.getElementById("year").appendChild(option);
}

function calculate(){

let day=document.getElementById("day").value;
let month=document.getElementById("month").value-1;
let year=document.getElementById("year").value;

if(!day || !month || !year){
document.getElementById("result").innerHTML="يرجى اختيار تاريخ الميلاد";
return;
}

let birth=new Date(year,month,day);
let now=new Date();

let years=now.getFullYear()-birth.getFullYear();
let months=now.getMonth()-birth.getMonth();
let days=now.getDate()-birth.getDate();

if(days<0){
months--;
let lastMonth=new Date(now.getFullYear(),now.getMonth(),0);
days+=lastMonth.getDate();
}

if(months<0){
years--;
months+=12;
}

document.getElementById("result").innerHTML=
`${years} سنة / ${months} شهر / ${days} يوم`;

}

</script>

</body>
</html>
