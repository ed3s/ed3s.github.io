<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>حاسبة العمر</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}
body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#0f0f10,#1c1c1e);
    font-family:'IBM Plex Sans Arabic', sans-serif;
    color:white;
    direction:rtl;
}
.container{
    width:360px;
    background:#1f1f21;
    border-radius:28px;
    padding:35px 25px;
    box-shadow:0 15px 40px rgba(0,0,0,0.5);
    text-align:center;
    transition:0.3s;
}
.container:hover{
    box-shadow:0 25px 50px rgba(0,0,0,0.7);
}
h1{
    font-size:24px;
    font-weight:600;
    margin-bottom:25px;
    letter-spacing:1px;
}
input[type="date"]{
    width:100%;
    padding:14px;
    border-radius:14px;
    border:none;
    background:#2c2c2e;
    color:white;
    font-size:16px;
    margin-bottom:20px;
    font-family:'IBM Plex Sans Arabic', sans-serif;
    direction:ltr;
    text-align:left;
    transition:0.2s;
}

input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(1) brightness(2);
    cursor: pointer;
}

input[type="date"]:focus{
    outline:none;
    box-shadow:0 0 8px #0a84ff;
}
button{
    width:100%;
    padding:14px;
    border-radius:14px;
    border:none;
    background:#0a84ff;
    color:white;
    font-size:16px;
    cursor:pointer;
    font-weight:500;
    transition:0.3s;
    font-family:'IBM Plex Sans Arabic', sans-serif;
}
button:hover{
    background:#409cff;
}
.card{
    margin-top:25px;
    background:#2c2c2e;
    padding:20px;
    border-radius:18px;
    font-size:20px;
    font-weight:500;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}
footer{
    margin-top:30px;
    font-size:12px;
    color:#888;
    text-align:center;
}
footer a {
	color: inherit;
    text-decoration: none;
}

</style>
</head>

<body>

<div class="container">

<h1>حاسبة العمر</h1>
تاريخ الميلاد
<input type="date" id="birth" lang="en" dir="ltr" onfocus="this.showPicker()">

<button onclick="calculate()">احسب العمر</button>

<div class="card" id="result"></div>

</div>

<footer>
بواسطة <a href="https://ed3s.com">ed3s.com</a>
</footer>

<script>
function calculate(){
    let birthValue=document.getElementById("birth").value;

    if(!birthValue){
        document.getElementById("result").innerHTML="يرجى إدخال تاريخ الميلاد";
        return;
    }

    let birth=new Date(birthValue);
    let now=new Date();

    let years=now.getFullYear()-birth.getFullYear();
    let months=now.getMonth()-birth.getMonth();
    let days=now.getDate()-birth.getDate();

    if(days<0){
        months--;
        let lastMonth=new Date(now.getFullYear(), now.getMonth(), 0);
        days += lastMonth.getDate();
    }

    if(months<0){
        years--;
        months += 12;
    }

    document.getElementById("result").innerHTML=
    `${years} سنة / ${months} شهر / ${days} يوم`;
}
</script>

</body>
</html>
