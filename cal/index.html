<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>حاسبة العمر</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#0f0f10,#1c1c1e);
font-family:'IBM Plex Sans Arabic', sans-serif;
color:white;
direction:rtl;
padding:20px;
}

.container{
width:100%;
max-width:420px;
background:#1f1f21;
border-radius:28px;
padding:35px 25px;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
text-align:center;
transition:0.3s;
}

.container:hover{
box-shadow:0 25px 50px rgba(0,0,0,0.7);
}

h1{
font-size:26px;
font-weight:600;
margin-bottom:20px;
letter-spacing:1px;
}

label{
display:block;
margin-bottom:10px;
font-size:14px;
color:#aaa;
}

input[type="date"]{
width:100%;
padding:16px;
border-radius:14px;
border:none;
background:#2c2c2e;
color:white;
font-size:17px;
margin-bottom:20px;
font-family:'IBM Plex Sans Arabic', sans-serif;
direction:ltr;
text-align:left;
transition:0.2s;
}

input[type="date"]::-webkit-calendar-picker-indicator {
filter: invert(1) brightness(2);
cursor:pointer;
}

input[type="date"]:focus{
outline:none;
box-shadow:0 0 8px #940aff;
}

button{
width:100%;
padding:16px;
border-radius:14px;
border:none;
background:#940aff;
color:white;
font-size:17px;
cursor:pointer;
font-weight:500;
transition:0.3s;
font-family:'IBM Plex Sans Arabic', sans-serif;
}

button:hover{
background:#a735ff;
}

.card{
margin-top:25px;
background:#2c2c2e;
padding:22px;
border-radius:18px;
font-size:22px;
font-weight:500;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
min-height:40px;
}

footer{
margin-top:30px;
font-size:12px;
color:#888;
text-align:center;
}

footer a{
color:inherit;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<h1>حاسبة العمر</h1>

<label>تاريخ الميلاد</label>

<input type="date" id="birth" lang="en" dir="ltr" onfocus="this.showPicker()">

<button onclick="calculate()">احسب العمر</button>

<div class="card" id="result"></div>

</div>

<footer>
بواسطة <a href="https://ed3s.com">ed3s.com</a>
</footer>

<script>

function calculate(){

let birthValue = document.getElementById("birth").value;

if(!birthValue){
document.getElementById("result").innerHTML="يرجى إدخال تاريخ الميلاد";
return;
}

let birth = new Date(birthValue);
let now = new Date();

let years = now.getFullYear() - birth.getFullYear();
let months = now.getMonth() - birth.getMonth();
let days = now.getDate() - birth.getDate();

if(days < 0){
months--;
let lastMonth = new Date(now.getFullYear(), now.getMonth(), 0);
days += lastMonth.getDate();
}

if(months < 0){
years--;
months += 12;
}

document.getElementById("result").innerHTML =
`${years} سنة / ${months} شهر / ${days} يوم`;

}

</script>

</body>
</html>
